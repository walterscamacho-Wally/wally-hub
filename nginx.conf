daemon off;
error_log /dev/stdout info;
worker_processes  auto;
events {
    worker_connections  1024;
}

http {
    include /nix/store/*-user-environment/conf/mime.types;
    access_log /dev/stdout;
    default_type  application/octet-stream;
    sendfile       on;
    keepalive_timeout  60;
    types_hash_max_size 4096;

    server {
        listen    80;
        gzip  	  on;
        root	  /app/;

        # Prevent redirecting to http:// when trailing slash is omitted behind reverse proxy
        absolute_redirect off;

        # Disable cache for all HTML pages and index directories
        location / {
            autoindex off;
            # Always disable cache for root/index pages and crm/hub entries
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # React router fallback and caching rules for Membresías
        location /membresias {
            alias /app/membresias/;
            autoindex off;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            try_files $uri $uri/ /membresias/index.html;
        }

        # Reverse proxy /api to the Node/Express backend on port 3001
        location /api {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static assets caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }
    }
}
