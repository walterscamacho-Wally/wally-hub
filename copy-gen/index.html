<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wally Copy Pro | Generador de Contenido</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #0A0A0A; 
            color: white; 
            background-image: radial-gradient(circle at top right, rgba(255, 107, 0, 0.05), transparent 40%);
        }
        .font-bebas { font-family: 'Bebas Neue', sans-serif; }
        .glass-card {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 107, 0, 0.1);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0A0A0A; }
        ::-webkit-scrollbar-thumb { background: #FF6B00; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [image, setImage] = useState(null);
            const [base64Image, setBase64Image] = useState(null);
            const [mimeType, setMimeType] = useState("image/png");
            const [loading, setLoading] = useState(false);
            const [copyOutput, setCopyOutput] = useState('');
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('wally_gemini_key') || '');
            
            // Cargar marcas desde localStorage o usar las por defecto
            const initialBrands = [
                { id: 'wally', name: 'Baila con Wally', context: 'Instructor de Ritmos Latinos, Zumba y Salsa. Tono base: Enérgico, masculino, motivador, invita al movimiento.', hashtags: '#BailaConWally #RitmosLatinos #ZumbaArgentina #ClasesDeBaile' },
                { id: 'alinearte', name: 'Alinearte Nordelta', context: 'Clínica de Odontología Estética y Bienestar. Tono base: Profesional, empático, experto, enfocado en salud y estética dental.', hashtags: '#AlinearteNordelta #EsteticaDental #SonrisaSana #OdontologiaNordelta' },
                { id: 'personal', name: 'Personal (Wally)', context: 'Wally como emprendedor y padre. Enfocado en estilo de vida activo, finanzas personales y balance familiar.', hashtags: '#WallyEmprende #VidaActiva #MentalidadGanadora #PapaEmprendedor' }
            ];

            const [brands, setBrands] = useState(() => {
                const saved = localStorage.getItem('wally_copy_brands');
                return saved ? JSON.parse(saved) : initialBrands;
            });

            const [tones] = useState([
                { id: 'entretenimiento', label: 'Entretenimiento 🎭' },
                { id: 'educativo', label: 'Educativo 🎓' },
                { id: 'informativo', label: 'Informativo 📰' },
                { id: 'publicitario', label: 'Publicitario/Venta 💰' },
                { id: 'emocional', label: 'Emocional/Inspirador ✨' },
                { id: 'desafiante', label: 'Desafiante 🔥' }
            ]);

            const [selectedBrandIdx, setSelectedBrandIdx] = useState(0);
            const [selectedToneIdx, setSelectedToneIdx] = useState(0);
            const [isEditingBrand, setIsEditingBrand] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [newBrandName, setNewBrandName] = useState('');
            const [showSettings, setShowSettings] = useState(!localStorage.getItem('wally_gemini_key'));

            // Guardar marcas cuando cambian
            useEffect(() => {
                localStorage.setItem('wally_copy_brands', JSON.stringify(brands));
            }, [brands]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setError(null);
                    setMimeType(file.type);
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setImage(reader.result);
                        setBase64Image(reader.result.split(',')[1]);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleConfirmAddBrand = () => {
                if (newBrandName.trim() === "") return;
                const newBrand = {
                    id: Date.now().toString(),
                    name: newBrandName.trim(),
                    context: 'Describí aquí de qué trata esta marca...',
                    hashtags: '#NuevaMarca'
                };
                setBrands([...brands, newBrand]);
                setSelectedBrandIdx(brands.length);
                setNewBrandName('');
                setShowAddModal(false);
                setIsEditingBrand(true);
            };

            const saveApiKey = (val) => {
                setApiKey(val);
                localStorage.setItem('wally_gemini_key', val);
            };

            const generateExpertCopy = async () => {
                if (!apiKey) {
                    setShowSettings(true);
                    setError("Configurá tu API Key primero.");
                    return;
                }
                if (!base64Image) {
                    setError("Subí una imagen para empezar.");
                    return;
                }
                setLoading(true);
                setCopyOutput('');
                setError(null);

                const currentBrand = brands[selectedBrandIdx];
                const currentTone = tones[selectedToneIdx];

                const systemPrompt = `Eres un Copywriter experto en Redes Sociales. Tono motivador, empático y profesional. Marca: ${currentBrand.name}. ${currentBrand.context}. TONO PARA HOY: ${currentTone.label}. Generar 3 opciones (Inspirador, Venta, Engagement). Voseo argentino obligatorio ("hacelo", "conectá"). Tono masculino (Wally hablando). Estructura limpia con emojis y hashtags (${currentBrand.hashtags}).`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                role: "user",
                                parts: [
                                    { text: `Generá 3 copys estratégicos para ${currentBrand.name} basados en esta visual.` },
                                    { inlineData: { mimeType: mimeType, data: base64Image } }
                                ]
                            }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (resultText) setCopyOutput(resultText);
                    else throw new Error("La IA no devolvió respuesta.");
                } catch (err) {
                    setError(err.message || "Error al conectar con la IA. Verificá tu API Key.");
                } finally {
                    setLoading(false);
                }
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(copyOutput);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="min-h-screen pb-12">
                    {/* Settings Modal (API KEY) */}
                    {showSettings && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
                            <div className="bg-[#1a1a1a] w-full max-w-sm rounded-[2rem] p-8 border border-orange-500/30 text-center">
                                <div className="w-16 h-16 bg-orange-600/20 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icon name="key" className="w-8 h-8 text-orange-500" />
                                </div>
                                <h3 className="font-bebas text-2xl uppercase mb-2">Configuración IA</h3>
                                <p className="text-white/40 text-xs mb-6 font-semibold">Ingresá tu Google API Key para activar el generador.</p>
                                <input 
                                    type="password"
                                    className="w-full p-4 bg-black border border-white/10 rounded-2xl text-sm font-bold outline-none focus:border-orange-500 mb-6 text-white text-center"
                                    value={apiKey}
                                    onChange={(e) => saveApiKey(e.target.value)}
                                    placeholder="Pegá tu API Key aquí..."
                                />
                                <button onClick={() => setShowSettings(false)} className="w-full py-4 bg-orange-600 rounded-2xl text-[12px] font-black uppercase tracking-widest">Activar Sistema</button>
                            </div>
                        </div>
                    )}

                    {/* Add Brand Modal */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className="bg-[#1a1a1a] w-full max-w-sm rounded-[2rem] p-8 border border-orange-500/30">
                                <h3 className="font-bebas text-xl uppercase text-orange-500 mb-6">Nuevo Cliente / Marca</h3>
                                <input 
                                    autoFocus
                                    className="w-full p-4 bg-black border border-white/10 rounded-2xl text-sm font-bold outline-none focus:border-orange-500 mb-6 text-white"
                                    value={newBrandName}
                                    onChange={(e) => setNewBrandName(e.target.value)}
                                    placeholder="Ej: Alinearte, Proyecto X..."
                                />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowAddModal(false)} className="flex-1 py-3 bg-white/5 rounded-2xl text-[10px] font-black uppercase">Cancelar</button>
                                    <button onClick={handleConfirmAddBrand} className="flex-1 py-3 bg-orange-600 rounded-2xl text-[10px] font-black uppercase">Agregar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <div className="bg-black pt-12 pb-24 px-6 rounded-b-[4rem] border-b border-orange-600/20 shadow-2xl relative overflow-hidden">
                        <div className="max-w-xl mx-auto flex justify-between items-start relative z-10">
                            <div>
                                <h1 className="font-bebas text-4xl italic tracking-tighter uppercase leading-none">WALLY <span className="text-orange-600">COPY PRO</span></h1>
                                <p className="text-white/40 text-[10px] font-black uppercase tracking-[0.3em] mt-2">IA Content Strategist</p>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="p-3 bg-white/5 rounded-2xl text-white/40 hover:text-orange-500 transition-colors">
                                <Icon name="settings" />
                            </button>
                        </div>
                        <div className="absolute top-[-50%] right-[-20%] w-96 h-96 bg-orange-600/10 rounded-full blur-[120px]"></div>
                    </div>

                    <div className="max-w-xl mx-auto px-4 -mt-12 space-y-6 relative z-20">
                        <div className="glass-card rounded-[2.5rem] shadow-2xl p-8 text-left">
                            <div className="space-y-6">
                                <section>
                                    <div className="flex justify-between items-center mb-3">
                                        <label className="text-[10px] font-black text-white/40 uppercase tracking-[0.2em]">Estrategia de Marca</label>
                                        <div className="flex gap-2">
                                            <button onClick={() => setIsEditingBrand(!isEditingBrand)} className={`p-2 rounded-xl transition-all ${isEditingBrand ? 'bg-orange-600 shadow-lg shadow-orange-900/40' : 'bg-white/5 text-white/30'}`}><Icon name="edit-3" /></button>
                                            <button onClick={() => setShowAddModal(true)} className="bg-orange-600/10 p-2 rounded-xl text-orange-500"><Icon name="plus" /></button>
                                        </div>
                                    </div>
                                    <div className="relative">
                                        <select 
                                            className="w-full p-4 rounded-2xl bg-black border border-white/5 text-sm font-bold text-white outline-none focus:border-orange-500 appearance-none cursor-pointer"
                                            value={selectedBrandIdx}
                                            onChange={(e) => { setSelectedBrandIdx(parseInt(e.target.value)); setIsEditingBrand(false); }}
                                        >
                                            {brands.map((b, i) => <option key={b.id} value={i}>{b.name}</option>)}
                                        </select>
                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-white/20">
                                            <Icon name="chevron-down" className="w-4 h-4" />
                                        </div>
                                    </div>
                                </section>

                                {isEditingBrand && (
                                    <section className="bg-black/50 p-6 rounded-3xl border border-orange-600/30 space-y-4 animate-in fade-in slide-in-from-top-4">
                                        <div>
                                            <label className="text-[9px] font-black text-orange-500 uppercase tracking-widest mb-2 block">Contexto y Tono</label>
                                            <textarea 
                                                className="w-full p-4 text-xs border border-white/10 rounded-2xl min-h-[120px] bg-black text-white outline-none focus:border-orange-500"
                                                value={brands[selectedBrandIdx].context}
                                                onChange={(e) => {
                                                    const updated = [...brands];
                                                    updated[selectedBrandIdx].context = e.target.value;
                                                    setBrands(updated);
                                                }}
                                            />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-orange-500 uppercase tracking-widest mb-2 block">Hashtags Fijos</label>
                                            <input 
                                                className="w-full p-4 text-xs border border-white/10 rounded-2xl bg-black text-white outline-none focus:border-orange-500"
                                                value={brands[selectedBrandIdx].hashtags}
                                                onChange={(e) => {
                                                    const updated = [...brands];
                                                    updated[selectedBrandIdx].hashtags = e.target.value;
                                                    setBrands(updated);
                                                }}
                                            />
                                        </div>
                                        <button onClick={() => setIsEditingBrand(false)} className="w-full py-4 bg-orange-600 rounded-2xl text-[10px] font-black uppercase tracking-widest">Guardar Estrategia</button>
                                    </section>
                                )}

                                {!isEditingBrand && (
                                    <>
                                        <section>
                                            <label className="text-[10px] font-black text-white/40 uppercase tracking-[0.2em] mb-3 block">Objetivo del Post</label>
                                            <div className="grid grid-cols-2 gap-2">
                                                {tones.map((t, i) => (
                                                    <button 
                                                        key={t.id}
                                                        onClick={() => setSelectedToneIdx(i)}
                                                        className={`p-3 rounded-xl text-[10px] font-bold border transition-all ${selectedToneIdx === i ? 'bg-orange-600 border-orange-500 text-white shadow-lg shadow-orange-900/20' : 'bg-black border-white/5 text-white/40 hover:border-white/20'}`}
                                                    >
                                                        {t.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </section>

                                        <section>
                                            <label className="text-[10px] font-black text-white/40 uppercase tracking-[0.2em] mb-3 block">Visual de Referencia</label>
                                            <div 
                                                className={`relative h-56 rounded-[2.5rem] border-2 border-dashed flex flex-col items-center justify-center cursor-pointer transition-all overflow-hidden ${image ? 'border-orange-600 bg-orange-600/5' : 'border-white/10 bg-black/50 hover:border-white/20'}`}
                                                onClick={() => document.getElementById('file-upload').click()}
                                            >
                                                {image ? (
                                                    <img src={image} className="w-full h-full object-cover" />
                                                ) : (
                                                    <div className="text-center">
                                                        <div className="w-12 h-12 bg-orange-600/10 rounded-full flex items-center justify-center mx-auto mb-3">
                                                            <Icon name="image" className="w-6 h-6 text-orange-500" />
                                                        </div>
                                                        <p className="text-[10px] font-bold text-white/40 uppercase">Toca para subir</p>
                                                    </div>
                                                )}
                                                <input id="file-upload" type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                                            </div>
                                        </section>

                                        <button 
                                            onClick={generateExpertCopy}
                                            disabled={loading || !image}
                                            className="w-full py-6 rounded-3xl bg-orange-600 text-white font-bebas italic text-2xl uppercase shadow-xl shadow-orange-900/40 disabled:opacity-20 transition-all active:scale-[0.98] flex items-center justify-center gap-3"
                                        >
                                            {loading ? (
                                                <div className="flex items-center gap-2">
                                                    <div className="w-5 h-5 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
                                                    <span>Redactando...</span>
                                                </div>
                                            ) : (
                                                <>
                                                    <Icon name="sparkles" className="w-6 h-6" />
                                                    <span>Generar Copys Pro</span>
                                                </>
                                            )}
                                        </button>
                                    </>
                                )}
                                
                                {error && <p className="text-red-400 text-[10px] font-bold text-center uppercase tracking-widest">{error}</p>}
                            </div>
                        </div>

                        {copyOutput && (
                            <div className="glass-card rounded-[2.5rem] overflow-hidden text-left animate-in fade-in slide-in-from-bottom-8 duration-500">
                                <div className="p-6 border-b border-white/5 flex justify-between items-center bg-black/20">
                                    <h2 className="text-[10px] font-black text-orange-500 uppercase tracking-[0.2em] flex items-center gap-2">
                                        <Icon name="file-text" className="w-3 h-3" />
                                        Sugerencias Estratégicas
                                    </h2>
                                    <button 
                                        onClick={copyToClipboard} 
                                        className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all flex items-center gap-2 ${copied ? 'bg-green-600' : 'bg-orange-600 hover:bg-orange-500'}`}
                                    >
                                        <Icon name={copied ? "check" : "copy"} className="w-3 h-3" />
                                        {copied ? "¡Copiado!" : "Copiar todo"}
                                    </button>
                                </div>
                                <div className="p-8 text-white/90 text-[14px] leading-relaxed whitespace-pre-wrap font-medium">
                                    {copyOutput}
                                </div>
                                <div className="p-6 bg-black/30 text-center">
                                    <p className="text-[9px] font-bold text-white/20 uppercase tracking-widest">Editado por Wally AI System</p>
                                </div>
                            </div>
                        )}
                    </div>

                    <footer className="mt-12 opacity-20 hover:opacity-50 transition-opacity">
                        <p className="text-[10px] font-black uppercase tracking-widest">Powered by Antigravity</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
